<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wohnungsbewerbung Sören & Zoé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FAF8F5;
      color: #1A1A18;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.25rem;
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 0.5rem;
      color: #1A1A18;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #999;
      margin-bottom: 2.75rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 0.875rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.9rem 1.25rem;
      border: 1.5px solid #E0DDD8;
      border-radius: 8px;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: #1A1A18;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 0.1em;
    }

    input[type="password"]::placeholder {
      letter-spacing: 0.05em;
      color: #ccc;
    }

    input[type="password"]:focus {
      border-color: #1A1A18;
    }

    input[type="password"].error {
      border-color: #b94a3a;
      background: #fdf6f5;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #1A1A18;
      color: #FAF8F5;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #2e2e2b;
    }

    button:active {
      transform: scale(0.99);
    }

    .error-msg {
      font-size: 0.8rem;
      color: #b94a3a;
      margin-top: 0.875rem;
      display: none;
    }

    /* Success state */
    #success {
      display: none;
    }

    .success-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 1rem;
      color: #1A1A18;
    }

    .success-text {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.65;
    }

    .drive-link {
      display: inline-block;
      padding: 0.85rem 2rem;
      border: 1.5px solid #1A1A18;
      border-radius: 8px;
      color: #1A1A18;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .drive-link:hover {
      background: #1A1A18;
      color: #FAF8F5;
    }

    .countdown {
      font-size: 0.775rem;
      color: #bbb;
      margin-top: 1.25rem;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Login -->
    <div id="login">
      <p class="label">Bewerbungsunterlagen</p>
      <h1>Sören & Zoé</h1>
      <p class="subtitle">Bitte Passwort eingeben um<br>auf die Unterlagen zuzugreifen.</p>

      <div class="form-group">
        <input type="password" id="password" placeholder="Passwort" autocomplete="off" autofocus>
      </div>
      <button onclick="checkPassword()">Zugang</button>
      <p class="error-msg" id="error-msg">Falsches Passwort — bitte erneut versuchen.</p>
    </div>

    <!-- Success -->
    <div id="success">
      <p class="success-label">Zugang gewährt</p>
      <h1 class="success-title">Willkommen.</h1>
      <p class="success-text">
        Sie werden automatisch weitergeleitet.<br>
        Falls die Weiterleitung nicht greift:
      </p>
      <a
        href="https://drive.google.com/drive/folders/1tQy7bl3g6AKHoq7IZ0CqHi6BjluBFJyS?usp=sharing"
        class="drive-link"
        target="_blank"
        rel="noopener"
      >
        Unterlagen öffnen →
      </a>
      <p class="countdown" id="countdown">Weiterleitung in 3 Sekunden …</p>
    </div>

  </div>

  <script>
    const PASSWORD = 'zoe_und_soeren';
    const DRIVE_URL = 'https://drive.google.com/drive/folders/1tQy7bl3g6AKHoq7IZ0CqHi6BjluBFJyS?usp=sharing';

    function checkPassword() {
      const input = document.getElementById('password').value;
      const pwInput = document.getElementById('password');
      const errorMsg = document.getElementById('error-msg');

      if (input === PASSWORD) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('success').style.display = 'block';

        let count = 3;
        const countEl = document.getElementById('countdown');

        const timer = setInterval(() => {
          count--;
          if (count > 0) {
            countEl.textContent = `Weiterleitung in ${count} Sekunde${count !== 1 ? 'n' : ''} …`;
          } else {
            clearInterval(timer);
            window.location.href = DRIVE_URL;
          }
        }, 1000);
      } else {
        pwInput.classList.add('error');
        errorMsg.style.display = 'block';
        pwInput.value = '';
        pwInput.focus();
        setTimeout(() => pwInput.classList.remove('error'), 2000);
      }
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
